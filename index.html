<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consultation gratuite</title>

<style>

html,body{
margin:0;
font-family:Arial;
background:url("https://i.postimg.cc/5jdTRnky/Design-sans-titre.png") center/cover no-repeat fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:40px 20px;
display:flex;
justify-content:center;
}

.box{
max-width:650px;
width:100%;
background:rgba(0,0,0,0.85);
padding:30px;
border-radius:12px;
box-shadow:0 0 20px #d71f26;
}

h1{
text-align:center;
margin-bottom:5px;
}

.sub{
text-align:center;
margin-bottom:20px;
font-size:14px;
}

label{
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:6px;
border:none;
}

.row{
display:flex;
gap:10px;
}

.row div{
flex:1;
}

button{
margin-top:25px;
width:100%;
padding:16px;
background:#000;
color:white;
font-size:18px;
border:none;
border-radius:10px;
box-shadow:0 0 15px #d71f26;
cursor:pointer;
}

</style>

</head>

<body>

<div class="overlay">

<div class="box">

<h1>Réservez votre consultation gratuite</h1>

<div class="sub">

🎁 Recevez une boîte d’échantillons gourmets si votre foyer est qualifié 🥩
<br>
Les deux adultes doivent remplir leurs informations sauf si vous vivez seul.

</div>

<form onsubmit="return envoyerFormulaire()">

<label>Nom Mr.</label>
<input required>

<label>Téléphone Mr.</label>
<input required>

<label>Nom Mme (laisser vide si vous vivez seul)</label>
<input id="nomMme">

<label>Téléphone Mme</label>
<input id="telMme">

<label>Nombre d'adultes</label>
<input type="number" id="adultes" min="1" max="6" required>

<label>Nombre d'enfants</label>
<input type="number" min="0" max="10" required>

<label>Épicerie principale</label>

<select id="ep1" required>

<option value="">Choisir</option>
<option>Costco</option>
<option>Maxi</option>
<option>Super C</option>
<option>Metro</option>
<option>IGA</option>
<option>Boucherie</option>
<option>Autre service de livraison à domicile</option>

</select>

<label>Épicerie secondaire</label>

<select id="ep2">

<option value="">Aucune</option>
<option>Costco</option>
<option>Maxi</option>
<option>Super C</option>
<option>Metro</option>
<option>IGA</option>
<option>Boucherie</option>
<option>Autre service de livraison à domicile</option>

</select>

<label>Dépense épicerie / semaine</label>

<select id="depense" required>

<option value="">Choisir</option>
<option value="moins50">moins de 50$</option>
<option value="plus50">50$ ou +</option>

</select>

<label>Congélateur séparé</label>

<select required>

<option>Oui</option>
<option>Non</option>

</select>

<label>Adresse</label>
<input required>

<div class="row">

<div>
<label>Ville</label>
<input required>
</div>

<div>
<label>Code postal</label>
<input required>
</div>

</div>

<label>Date consultation</label>
<input type="date" id="date" required>

<label>Heure</label>

<select required>

<option>09h</option>
<option>10h</option>
<option>11h</option>
<option>12h</option>
<option>13h</option>
<option>14h</option>
<option>15h</option>
<option>16h</option>
<option>17h</option>
<option>18h</option>
<option>19h</option>
<option>20h</option>

</select>

<button>

Réserver ma consultation gratuite

</button>

<p style="text-align:center;margin-top:15px;">
Quantités limitées — réservé aux foyers qualifiés.*
<br>
Vivez l’expérience dès maintenant !
</p>

</form>

</div>

</div>

<script>

const dateInput=document.getElementById("date");

let today=new Date();
today.setHours(0,0,0,0);

let min=new Date(today.getTime()+48*60*60*1000);
let max=new Date(today.getTime()+15*24*60*60*1000);

dateInput.min=min.toISOString().split("T")[0];
dateInput.max=max.toISOString().split("T")[0];

function envoyerFormulaire(){

let adultes=document.getElementById("adultes").value;

let nomMme=document.getElementById("nomMme").value;
let telMme=document.getElementById("telMme").value;

if(adultes>1 && (nomMme=="" || telMme=="")){

alert("Veuillez remplir les informations de Mme si plus de 1 adulte.");

return false;

}

let ep1=document.getElementById("ep1").value.toLowerCase();
let ep2=document.getElementById("ep2").value.toLowerCase();

let depense=document.getElementById("depense").value;

if(ep1=="maxi" || ep1=="super c" || ep2=="maxi" || ep2=="super c" || depense=="moins50"){

window.location.href="nonqualifie.html";

}else{

window.location.href="merci.html";

}

return false;

}

</script>

</body>
</html>
