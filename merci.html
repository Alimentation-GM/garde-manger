<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Merci</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url('https://i.postimg.cc/5jdTRnky/Design-sans-titre.png');
background-size:cover;
background-position:center;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{
background-color:rgba(0,0,0,0.75);
padding:50px;
border-radius:12px;
box-shadow:0 0 20px #d71f26;
max-width:600px;
}

/* Bouton */
a{
display:inline-block;
margin-top:20px;
padding:15px 25px;
background:black;
color:white;
text-decoration:none;
border-radius:8px;
box-shadow:0 0 15px #d71f26;
transition:all 0.3s ease;
}

/* Effet hover */
a:hover{
background:#d71f26;
box-shadow:0 0 25px #d71f26;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="box">

<h1>Merci pour votre intérêt</h1>

<p>
Merci de votre intérêt, nous vous recontacterons au besoin.
</p>

<a href="https://garde-manger.com/fr/concept/">
Voir le concept
</a>

</div>

</body>

</html>
